version: '3.8'

services:
  # Base de dados Centralizada para o BartNotes
  db:
    image: postgres:15-alpine
    container_name: bartnotes-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: bartnotes
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U user -d bartnotes" ]
      interval: 5s
      timeout: 5s
      retries: 5

  # S3 Storage (MinIO) para anexos do BartNotes
  storage:
    image: minio/minio
    container_name: bartnotes-storage_minio
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9000/minio/health/live" ]
      interval: 30s
      timeout: 20s
      retries: 3

  createbuckets:
    image: minio/mc
    container_name: bartnotes-mc
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c " /usr/bin/mc config host add myminio http://minio:9000 minioadmin minioadmin; /usr/bin/mc mb -p myminio/notes-attachments; /usr/bin/mc mb -p myminio/notes-backups; exit 0; "

volumes:
  pgdata:
  miniodata:
